schema_version: 1

context:
  name: pyan3
  version: "2.4.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pyan3-${{ version }}.tar.gz
  sha256: 3ede0a79e7ba42271faf0de234f7d2733d325ec667c2907d1934dff0f6f33d97

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - pyan3 = pyan.main:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - hatchling
  run:
    - jinja2
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pyan
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pyan3 --help

about:
  summary: Offline call graph generator for Python 3
  license: GPL-2.0-only
  license_file: LICENSE.md
  homepage: https://github.com/Technologicat/pyan

extra:
  recipe-maintainers:
    - thewchan
